<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='css/admin/products.css')}}">
    <title>Trackings</title>
</head>

<body>

    <!-- Hamburger menu button (visible on mobile, for opening sidebar) -->
    <button id="hamburgerMenuOpen" class="hamburger-menu" aria-label="Open Sidebar">
        <span></span>
        <span></span>
        <span></span>
    </button>
    {% include 'admin/sidebar.html' %}

    <div class="main-content">
        <div class="header">
            <h1>Trackings</h1>
            <div class="user-info">
                <img src="" alt="admin">
                <span>Admin</span>
            </div>
        </div>
        <!-- main product container -->
        <div class="main-container">
            <div class="content-header">
                <h1>All Trackings</h1>
                <div class="header-buttons">
                    <button>Export</button>
                    <button>Import</button>
                    <a href="/viaadmin/add/product">
                        <button type="button">Create Trackings</button>
                    </a>
                    <a href="#" onclick="deleteSelectedProducts();">
                        <button type="button" class="btn btn-delete" style="margin-bottom: 10px;"
                            onclick="deleteSelectedProducts();">
                            Delete Selected Products
                        </button>
                    </a>
                </div>
            </div>
            <div class="products-container">
                <div class="product-table-container">
                    <div class="product-filters">
                        <button>All Trackings</button>
                        <button>Confirmed</button>
                        <button>Out for Delivery</button>
                        <button>Delivered</button>
                    </div>
                    <div class="products-sorting">
                        <div class="product-count">
                            <h2>1</h2>
                        </div>
                        <div class="product-search">
                            <input type="search" placeholder="Search...">
                        </div>
                    </div>
                    <div class="product-table">
                        <table>
                            <thead>
                                <tr>
                                    <th><input type="checkbox" id="select-all"></th>
                                    <th>S.No</th>
                                    <th>Order ID</th>
                                    <th>Tracking</th>
                                    <th>Customer</th>
                                    <th>Address</th>
                                    <th>City</th>
                                    <th>Status</th>
                                    <th class="action">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="product-details">
                                <!-- Example static row -->
                                <tr>
                                    <td><input type="checkbox" class="product-checkbox" value="1"></td>
                                    <td>1</td>
                                    <td>88820</td>
                                    <td>SS99902</td>
                                    <td>Aqib</td>
                                    <td>Ghulistan e sajjad</td>
                                    <td>Hyd</td>
                                    <td class="status-active">Active</td>
                                    <td class="actions">
                                        <div class="action-buttons">
                                            <a href="/viaadmin/edit/product/1" class="btn btn-edit" title="Edit">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <form action="/viaadmin/delete/product/1" method="POST"
                                                style="display:inline;">
                                                <button type="submit" class="btn btn-delete" title="Delete"
                                                    onclick="return confirm('Are you sure you want to delete this product?');">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </form>
                                            <a href="#" class="btn btn-draft" title="Save as Draft"><i
                                                    class="fas fa-save"></i></a>
                                            <a href="#" class="btn btn-publish" title="Publish"><i
                                                    class="fas fa-upload"></i></a>
                                        </div>
                                    </td>
                                </tr>
                                <!-- Add more static rows as needed -->
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-info">
                        <div></div>
                        <div class="pagination-controls">
                            <button><i class="fas fa-chevron-left"></i></button>
                            <button class="active">1</button>
                            <button>2</button>
                            <button>3</button>
                            <button>...</button>
                            <button><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script>
        // Sidebar mobile toggle (hamburger in header and sidebar)
        document.addEventListener('DOMContentLoaded', function () {
            const hamburgerMenuOpen = document.getElementById('hamburgerMenuOpen');
            const hamburgerMenuClose = document.getElementById('hamburgerMenuClose');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('hamburgerMenuSidebar');
            const mainContent = document.getElementById('mainContent');

            function openSidebar() {
                if (hamburgerMenuOpen) hamburgerMenuOpen.classList.add('active');
                if (sidebar) sidebar.classList.add('mobile-open');
                if (overlay) overlay.style.display = 'block';
                document.body.classList.add('mobile-sidebar-open');
                if (mainContent) mainContent.classList.add('hide-on-sidebar');
            }
            function closeSidebar() {
                if (hamburgerMenuOpen) hamburgerMenuOpen.classList.remove('active');
                if (sidebar) sidebar.classList.remove('mobile-open');
                if (overlay) overlay.style.display = 'none';
                document.body.classList.remove('mobile-sidebar-open');
                if (mainContent) mainContent.classList.remove('hide-on-sidebar');
            }

            if (hamburgerMenuOpen) {
                hamburgerMenuOpen.addEventListener('click', function (e) {
                    e.stopPropagation();
                    openSidebar();
                });
            }
            if (hamburgerMenuClose) {
                hamburgerMenuClose.addEventListener('click', function (e) {
                    e.stopPropagation();
                    closeSidebar();
                });
            }
            if (overlay) {
                overlay.addEventListener('click', function () {
                    closeSidebar();
                });
            }
            if (sidebar) {
                // Close sidebar when clicking a menu item (on mobile)
                const menuItems = sidebar.querySelectorAll('.menu-item');
                menuItems.forEach(function (item) {
                    item.addEventListener('click', function () {
                        if (window.innerWidth <= 768) {
                            closeSidebar();
                        }
                    });
                });
            }
            // Hide sidebar on resize to desktop
            window.addEventListener('resize', function () {
                if (window.innerWidth > 768) {
                    closeSidebar();
                }
            });
        });


        // Select/deselect all checkboxes
        document.getElementById("select-all").addEventListener("click", function () {
            document.querySelectorAll(".product-checkbox").forEach(cb => cb.checked = this.checked);
        });

        function deleteSelectedProducts() {
            const selected = Array.from(document.querySelectorAll(".product-checkbox:checked")).map(cb => cb.value);

            if (selected.length === 0) {
                alert("Please select at least one product to delete.");
                return;
            }

            if (!confirm("Are you sure you want to delete the selected products?")) {
                return;
            }

            // Example: Remove the deleted rows from the table without reloading
            selected.forEach(id => {
                const checkbox = document.querySelector(`.product-checkbox[value="${id}"]`);
                if (checkbox) {
                    const row = checkbox.closest("tr");
                    if (row) row.remove();
                }
            });
            alert("Products deleted successfully.");
        }
    </script>

</body>

</html>
