<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE-edge">
        <meta name="viewport" content="width-device-width, initial-scale-1.0">
        <title>Login</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.2.1/assets/owl.carousel.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/jquery-nice-select/1.1.0/css/nice-select.min.css">
        <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet">
        <link rel="stylesheet" href="{{url_for('static', filename='css/login.css')}}">
        <style>
          .overlay {
  background-image: url('{{ url_for('static', filename='images/1.gif') }}');
  background-repeat: no-repeat;
  background-size: cover;
  background-position: 0 0;
  color: #fff;
  position: relative;
  left: -100%;
  height: 100%;
  width: 200%;
  transform: translateX(0);
  transition: transform 0.6s ease-in-out;
}
.popup {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    color: white;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 9999;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  .popup-success {
    background-color: rgba(50, 205, 50, 0.85); /* Light green */
  }
  .popup-error {
    background-color: rgba(220, 20, 60, 0.85); /* Light red */
  }
          </style>
    </head>

    <body>

     
<div id="popup" class="popup" style="display:none;">
  <div id="popup-message" class="popup-message"></div>
</div>
        <div class="container" id="container">

  <div class="form-container register-container">
    <form id="register-form" action="{{ url_for('routes.login') }}" method="post">
  <h1>Register here.</h1>
  <input type="text" placeholder="Name" name="name" required>
  <input type="email" placeholder="Email" name="email" required>
  <input type="password" placeholder="Password" name="password" required>
  <button type="submit">Register</button>
  <span>or use your account</span>
  <div class="social-container">
    <a href="#" class="social"><i class="lni lni-facebook-fill"></i></a>
    <a href="#" class="social"><i class="lni lni-google"></i></a>
    <a href="#" class="social"><i class="lni lni-twitter-original"></i></a>
  </div>
</form>

  </div>

  <div class="form-container login-container">
    <form action="{{ url_for('routes.login') }}" method="post">
      <h1>Login here.</h1>
      <input type="email" placeholder="Email" name="email" required>
      <input type="password" placeholder="Password" name="password" required>
      <div class="content">
        <div class="checkbox">
          <input type="checkbox" name="checkbox" id="checkbox">
          <label for="checkbox">Remember me</label>
        </div>
        <div class="pass-link">
          <a href="#">Forgot password?</a>
        </div>
      </div>
      <button type="submit">Login</button>
      <span>or use your account</span>
      <div class="social-container">
        <a href="#" class="social"><i class="lni lni-facebook-fill"></i></a>
        <a href="#" class="social"><i class="lni lni-google"></i></a>
        <a href="#" class="social"><i class="lni lni-twitter-original"></i></a>
      </div>
    </form>
  </div>

  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-left">
        <h1 class="title">Hello <br> Perfume Lovers!</h1>
        <p>If you have an account, login here and surf the latest fragrance</p>
        <button class="ghost" id="login">Login
          <i class="lni lni-arrow-left login"></i>
        </button>
      </div>
      <div class="overlay-panel overlay-right">
        <h1 class="title">Begin your <br> Surf now</h1>
        <p>If you don't have an account yet, join us and begin your surf.</p>
        <button class="ghost" id="register">Register
          <i class="lni lni-arrow-right register"></i>
        </button>
      </div>
    </div>
  </div>

</div>


        
      
        <script defer src="{{ url_for('static', filename='js/login.js')}}"></script>
      <script>
 // Function to show popup message
  function showPopup(message, type) {
    // Create popup div
    const popup = document.createElement('div');
    popup.textContent = message;

    // Styling based on type
    popup.style.position = 'fixed';
    popup.style.top = '20px';
    popup.style.left = '50%';
    popup.style.transform = 'translateX(-50%)';
    popup.style.padding = '15px 30px';
    popup.style.color = '#fff';
    popup.style.fontSize = '16px';
    popup.style.borderRadius = '8px';
    popup.style.zIndex = '9999';
    popup.style.backdropFilter = 'blur(5px)';
    popup.style.boxShadow = '0 0 10px rgba(0,0,0,0.2)';
    popup.style.opacity = '0.95';

    if (type === 'success') {
      popup.style.backgroundColor = 'rgba(0, 128, 0, 0.7)'; // Light green
    } else if (type === 'error') {
      popup.style.backgroundColor = 'rgba(255, 0, 0, 0.7)'; // Light red
    }

    document.body.appendChild(popup);

    // Remove popup after 3 seconds
    setTimeout(() => {
      popup.remove();
    }, 3000);
  }

  // Handle form submit with AJAX
  document.getElementById('register-form').addEventListener('submit', function(event) {
    event.preventDefault(); // Prevent default form submit

    const formData = new FormData(this);

    fetch(this.action, {
      method: 'POST',
      body: formData,
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === 'success') {
        showPopup(data.message, 'success');

        // Reload page after 2 seconds (to allow user to see popup)
        setTimeout(() => {
          window.location.reload();
        }, 2000);
      } else if (data.status === 'error') {
        showPopup(data.message, 'error');
        // No reload here — user can fix input and try again
      }
    })
    .catch(() => {
      showPopup('Something went wrong. Try again.', 'error');
    });
  });
      </script>
      </body>
      
</html>
