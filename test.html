<!DOCTYPE html>
<html>
<head>
  <title>JavaScript If-Else Example</title>
</head>
<body>
  <h2>Check Voting Eligibility</h2>

  <!-- Input -->
  <label>Enter your age:</label>
  <input type="number" id="ageInput">
  <button onclick="checkAge()">Check</button>

  <!-- Output -->
  <p id="result"></p>

  <script>
    function checkAge() {
      let age = document.getElementById("ageInput").value;
      
      if (age >= 18) {
        document.getElementById("result").innerHTML = "✅ You can vote!";
      } else {
        document.getElementById("result").innerHTML = "❌ You are too young to vote.";
      }
    }
  </script>
</body>
</html>
