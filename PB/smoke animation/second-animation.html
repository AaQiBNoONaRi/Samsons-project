<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fading Image Card</title>
    <style>body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }
    
    .card-container {
        text-align: center;
        max-width: 300px;
    }
    
    .card {
        width: 300px;
        height: 300px;
        position: relative;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
    }
    
    .card img {
        position: absolute;
        right: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 0.3s ease;
    }
    
    .image1 {
        opacity: 1;
    }
    
    .image2 {
        opacity: 0;
    }
    
    .card:hover .image1 {
        opacity: 0;
    }
    
    .card:hover .image2 {
        opacity: 1;
    }
    
    .card-text {
        padding: 0 15px;
    }
    
    .card-text h3 {
        margin-bottom: 10px;
        color: #333;
    }
    
    .card-text p {
        color: #666;
        margin: 0;
    }</style>
</head>
<body>
    <div class="card-container">
        <div class="card">
            <img src="N1-1.png" alt="Nature" class="image1">
            <img src="N2-1.png" alt="City" class="image2">
        </div>
        
        <div class="card-text">
            <h3>Image Transition</h3>
            <p>Hover over the image to see the transition effect</p>
        </div>
    </div>
</body>
</html>
